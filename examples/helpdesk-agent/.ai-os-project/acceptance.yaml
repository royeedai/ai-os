version: 1
scope:
  type: module
  name: "ticket-triage"
  spec: "specs/ticket-triage.spec.md"

gates:
  - id: GATE-001
    title: "需求对齐"
    status: passed
    checks:
      - "spec 已确认"
      - "高风险场景范围明确"
    evidence:
      - "spec-review-note"

  - id: GATE-002
    title: "实现与测试"
    status: pending
    checks:
      - "分诊逻辑完成"
      - "高风险场景转人工"
      - "测试通过"
    evidence:
      - "build-log"
      - "test-log"

  - id: GATE-003
    title: "运行验证与交付证据"
    status: pending
    checks:
      - "本次变更要求的验证动作已执行"
      - "triage worker 已完成重启"
      - "冷启动 smoke 已完成"
      - "review-report 已输出"
      - "release-plan 已补全"
      - "关键 eval 已沉淀"
    evidence:
      - "verification-plan"
      - "restart-log"
      - "cold-start-log"
      - "post-restart-smoke-log"
      - "review-report"
      - "release-plan"
      - "eval-case"

  - id: GATE-004
    title: "人工验证（UAT）"
    status: pending
    checks:
      - "UAT 脚本已生成"
      - "用户已执行 UAT 并确认结果"
    evidence:
      - "uat-result"

result:
  decision: blocked
  blockers:
    - "TASK-003 尚未完成，无法进入交付"
  advisories: []
