version: 1
scope:
  type: module
  name: "example-module"
  spec: "specs/example.spec.md"

gates:
  - id: GATE-001
    title: "需求对齐"
    status: pending
    checks:
      - "spec 已确认"
      - "变更已同步"
    evidence: []

  - id: GATE-002
    title: "实现与测试"
    status: pending
    checks:
      - "核心功能已实现"
      - "构建通过"
      - "测试通过"
    evidence:
      - "build-log"
      - "test-log"

  - id: GATE-003
    title: "交付证据"
    status: pending
    checks:
      - "关键接口样例或截图齐全"
      - "风险与剩余问题已记录"
      - "review-report 或验收报告已输出"
    evidence:
      - "api-sample-or-screenshot"
      - "risk-note"
      - "review-report"

  - id: GATE-004
    title: "人工验证（UAT）"
    status: pending
    checks:
      - "UAT 脚本已生成"
      - "用户已执行 UAT 并确认结果"
    evidence:
      - "uat-result"

result:
  decision: blocked
  blockers: []
  advisories: []
